spring:
  config:
    import: optional:file:../.env[.properties]

  application:
    name: shiftplanner

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:shiftplanner}}
    username: ${DB_USER:shiftplanner}
    password: ${DB_PASSWORD:shiftplanner}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

shiftplanner:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  seed:
    enabled: ${SEED_ENABLED:false}
    admin-password: ${SEED_ADMIN_PASSWORD:admin123}
    user-count: ${SEED_USER_COUNT:15}
    team-count: ${SEED_TEAM_COUNT:3}
