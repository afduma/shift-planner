spring:
  config:
    import: optional:file:../.env[.properties]

  application:
    name: shiftplanner

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:shiftplanner}}
    username: ${DB_USER:shiftplanner}
    password: ${DB_PASSWORD:shiftplanner}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

shiftplanner:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
