services:
  postgres:
    image: postgres:17
    container_name: shift-planner-postgres
    environment:
      POSTGRES_DB: shiftplanner
      POSTGRES_USER: shiftplanner
      POSTGRES_PASSWORD: shiftplanner
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
